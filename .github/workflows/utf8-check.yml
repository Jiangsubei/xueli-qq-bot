name: UTF-8 Check

on:
  push:
  pull_request:

jobs:
  utf8-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run UTF-8 scan
        run: python scripts/check_utf8.py .
