<div id="page-network" class="page-section">
  <form class="grid-container console-grid settings-form stacked-form multi-card-form" data-form-section="network">
    <section class="card mica-material col-12 config-section-card">
      <div class="card-bar">
        <div>
          <h3 class="card-title">平台连接设置</h3>
          <p class="card-desc">这里告诉助手该怎么连接事件 adapter 和出站接口。</p>
        </div>
      </div>
      <div class="config-item-grid two-up">
        <label class="config-item-card">
          <span class="config-item-head">
            <span class="config-item-title-stack">
              <span class="config-item-title">Adapter类型</span>
              <span class="config-item-desc">选择当前运行时使用的接入 adapter。</span>
            </span>
            <span class="field-help" tabindex="0" data-help="{{ field_help.network.adapter }}">?</span>
          </span>
          <select class="form-control" name="adapter">
            <option value="napcat" {% if network_form.adapter == "napcat" %}selected{% endif %}>NapCat / OneBot</option>
            <option value="api" {% if network_form.adapter == "api" %}selected{% endif %}>API</option>
            <option value="openapi" {% if network_form.adapter == "openapi" %}selected{% endif %}>OpenAPI</option>
          </select>
        </label>
        <label class="config-item-card">
          <span class="config-item-head">
            <span class="config-item-title-stack">
              <span class="config-item-title">平台标识</span>
              <span class="config-item-desc">归一化事件和出站动作时，会带上这个平台名。</span>
            </span>
            <span class="field-help" tabindex="0" data-help="{{ field_help.network.platform }}">?</span>
          </span>
          <input class="form-control" name="platform" type="text" value="{{ network_form.platform }}" placeholder="例如 qq / api / discord">
        </label>
        <label class="config-item-card">
          <span class="config-item-head">
            <span class="config-item-title-stack">
              <span class="config-item-title">WebSocket地址</span>
              <span class="config-item-desc">助手会通过这个地址接收平台推送的事件。</span>
            </span>
            <span class="field-help" tabindex="0" data-help="{{ field_help.network.ws_url }}">?</span>
          </span>
          <input class="form-control" name="ws_url" type="text" value="{{ network_form.ws_url }}">
        </label>
        <label class="config-item-card">
          <span class="config-item-head">
            <span class="config-item-title-stack">
              <span class="config-item-title">HTTP地址</span>
              <span class="config-item-desc">需要主动调用平台接口时，会通过这个地址访问 adapter 服务。</span>
            </span>
            <span class="field-help" tabindex="0" data-help="{{ field_help.network.http_url }}">?</span>
          </span>
          <input class="form-control" name="http_url" type="text" value="{{ network_form.http_url }}">
        </label>
      </div>
    </section>
  </form>
</div>
