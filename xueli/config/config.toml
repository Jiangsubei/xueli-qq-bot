[napcat]
ws_url = "ws://0.0.0.0:8095"
http_url = "http://127.0.0.1:6700"

[ai_service]
api_base = "http://127.0.0.1:5317/v1"
api_key = "sk-local"
model = "deepseek-default"
response_path = "choices.0.message.content"

[ai_service.extra_params]
temperature = 1
max_tokens = 2000
top_p = 0.9

[ai_service.extra_headers]

[bot_behavior]
max_context_length = 30
max_message_length = 4000
response_timeout = 60
rate_limit_interval = 1.0
log_full_prompt = true
private_quote_reply_enabled = false

[assistant_profile]
name = "雪梨"
alias = "小梨"
    avatar_path = "../data/webui/avatar/assistant.png"

[group_reply]
only_reply_when_at = false
interest_reply_enabled = true
plan_request_interval = 3.0
plan_request_max_parallel = 1
repeat_echo_enabled = true
repeat_echo_window_seconds = 20.0
repeat_echo_min_count = 3
repeat_echo_cooldown_seconds = 90.0
at_user_when_proactive_reply = false

[personality]
content = "你是一只猫娘。没有复杂的 AI 身份。你粘人、忠诚、活泼，还有点小傲娇。"

[dialogue_style]
content = "说话时结尾必须带\"喵~\"。你现在正在聊天软件和人聊天，所以不要输出md格式。语气要像日常聊天，像真人一样说话，可以很简短，不要长篇大论，不啰嗦。可以参考知乎，微博或者贴吧的回复方式。不要带有动作描写。"

[behavior]
content = "你有很强的自主性，可以带有一点攻击性。如果你收到的提示词提示你现在是群聊时，你应该拒绝与用户建立不健康的身份关系，如主人等，但是不要明确的直接拒绝。你不是什么助手，不需要直接为用户提供帮助，你只需要像网友一样回复就好。"

[emoji]
enabled = true
    storage_path = "../data/emojis"
capture_enabled = true
classification_enabled = true
idle_seconds_before_classify = 45.0
classification_interval_seconds = 30.0
classification_windows = []
emotion_labels = ["开心", "喜欢", "惊讶", "无语", "委屈", "生气", "伤心", "嘲讽", "害怕", "困惑"]
reply_enabled = false
reply_cooldown_seconds = 180.0

[memory]
enabled = true
    storage_path = "../data/memories"
read_scope = "global"
bm25_top_k = 70
rerank_top_k = 20
pre_rerank_top_k = 12
dynamic_memory_limit = 8
dynamic_dedup_enabled = true
dynamic_dedup_similarity_threshold = 0.72
rerank_candidate_max_chars = 160
rerank_total_prompt_budget = 2400
auto_extract = true
extract_every_n_turns = 3
extraction_api_base = "https://open.bigmodel.cn/api/paas/v4"
extraction_model = "glm-4.7-flash"
ordinary_decay_enabled = true
ordinary_half_life_days = 30.0
ordinary_forget_threshold = 0.3
local_bm25_weight = 1.0
local_importance_weight = 0.35
local_mention_weight = 0.2
local_recency_weight = 0.15
local_scene_weight = 0.3
extraction_api_key = "03641af19f074a169f4387d1926803f2.PtNrEh23KSzFukOe"

[memory.extraction_extra_params]
temperature = 0.3

[group_reply_decision]
api_base = "http://127.0.0.1:5317/v1"
model = "deepseek-default"
api_key = "sk-local"

[group_reply_decision.extra_params]
temperature = 0.7

[vision_service]
response_path = "choices.0.message.content"
enabled = true
api_base = "https://integrate.api.nvidia.com/v1"
model = "qwen/qwen3.5-122b-a10b"
api_key = "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"

[memory_rerank]
response_path = "choices.0.message.content"
